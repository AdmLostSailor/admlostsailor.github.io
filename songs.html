<!doctype html>
<html lang="en" data-type="elegant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Song Library · Terrapin Ouroboros</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Space+Grotesk:wght@400;500;600&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<link href="assets/terrapin.css" rel="stylesheet">
<style>
  .lib-head{padding:38px 0 8px;text-align:center}
  .lib-head h1{font-size:clamp(38px,6vw,68px);margin:8px 0 0}
  .lib-head p{color:var(--muted);font-size:17px;max-width:600px;margin:12px auto 0}
  .controls{position:sticky;top:63px;z-index:300;background:linear-gradient(180deg,rgba(10,6,22,.92),rgba(10,6,22,.78));
    backdrop-filter:blur(12px);border-top:1px solid var(--line);border-bottom:1px solid var(--line);
    padding:14px 0;margin-top:26px}
  .controls .wrap{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .controls input,.controls select{font-family:var(--ui);font-size:14px;color:var(--text);
    background:rgba(160,123,255,.08);border:1px solid var(--line);border-radius:10px;padding:11px 14px;outline:none}
  .controls input{flex:1 1 220px;min-width:180px}
  .controls input::placeholder{color:var(--faint)}
  .controls input:focus,.controls select:focus{border-color:var(--violet)}
  .controls .toggle{font-family:var(--ui);font-size:13px;color:var(--muted);border:1px solid var(--line);
    border-radius:10px;padding:11px 14px;background:rgba(160,123,255,.06);transition:.14s;white-space:nowrap}
  .controls .toggle.on{color:var(--gold);border-color:var(--line-warm);background:rgba(243,198,79,.12)}
  .count{font-family:var(--ui);font-size:13px;color:var(--faint);margin-left:auto;white-space:nowrap}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:18px;padding:28px 0 60px}
  .song-card{cursor:pointer;border-left:3px solid var(--accent,var(--violet));display:flex;flex-direction:column;gap:9px}
  .song-card .scm{font-family:var(--ui);font-size:11.5px;letter-spacing:.06em;color:var(--accent,var(--warm));text-transform:uppercase}
  .song-card h3{font-size:24px;line-height:1.05}
  .song-card .scsum{color:var(--muted);font-size:14px;line-height:1.5;font-style:italic;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;flex:1}
  .song-card .scoris{display:flex;flex-wrap:wrap;gap:5px}
  .song-card .miniori{font-family:var(--ui);font-size:10.5px;letter-spacing:.02em;border-radius:999px;padding:3px 9px;border:1px solid currentColor}
  .song-card .scfoot{display:flex;align-items:center;gap:8px;font-family:var(--ui);font-size:12px;color:var(--faint);margin-top:2px}
  .song-card .dodd{color:var(--gold)}
  .song-card .open{margin-left:auto;color:var(--teal)}
  .empty{text-align:center;color:var(--faint);font-family:var(--ui);padding:60px 0}
</style>
</head>
<body>
<main>
  <header class="lib-head wrap">
    <div class="kicker gold" id="libKicker">All Songs</div>
    <h1 class="display">The Song Library</h1>
    <p>Every song is a gesture toward Terrapin — in longing, loss, arrival, exile, or false imitation. Search, filter, and open any one for lyrics, its cast of characters, folklore, and full reading.</p>
  </header>

  <div class="controls">
    <div class="wrap">
      <input id="q" type="search" placeholder="Search by title…" autocomplete="off">
      <select id="cat"><option value="">All categories</option><option value="rotation" selected>Regular Rotation</option><option value="gd">GD Originals</option><option value="cover">Covers</option><option value="studio">Discography Only</option></select>
      <select id="sort">
        <option value="az">A → Z</option>
        <option value="za">Z → A</option>
        <option value="played">Most played</option>
      </select>
      <button class="toggle" id="doddT">◆ Annotated only</button>
      <span class="count" id="count"></span>
    </div>
  </div>

  <div class="wrap"><div class="grid" id="grid"></div><div class="empty" id="empty" style="display:none">No songs match those filters.</div></div>
</main>

<script src="data/terrapin_data.js"></script>
<script src="data/terrapin_stats.js"></script>
<script src="data/song_tiers.js"></script>
<script src="assets/terrapin.js"></script>
<script>
(function(){
const T=window.Terra, SONGS=T.SONGS, CATALOG_SONGS=T.CATALOG_SONGS, esc=T.esc;
const $=id=>document.getElementById(id);
let doddOnly=false;
const STATS=(window.TERRAPIN_STATS||{}).songStats||{};
const TIERS=window.SONG_TIER||{};
const CAT_LABEL={rotation:'Regular Rotation',gd:'GD Original',cover:'Cover',studio:'Discography Only'};

// fill selects
// fill category — already pre-selected in HTML
Object.keys(T.DIR_META).forEach(d=>{const op=document.createElement('option');op.value=d;op.textContent=T.dirLabel(d);$('ori')&&$('ori').appendChild(op);});

function filtered(){
  const q=$('q').value.toLowerCase().trim(), cat=$('cat').value;
  let arr=CATALOG_SONGS.filter(s=>{
    if(q){const hay=[s.display_title,...(s.aliases||[])].join(' ').toLowerCase();if(!hay.includes(q))return false;}
    if(cat && TIERS[s.song_key_norm]!==cat) return false;
    if(doddOnly && !(s.dodd_annotations||[]).length) return false;
    return true;
  });
  const sort=$('sort').value;
  const plays=k=>(STATS[k]&&STATS[k].plays)||0;
  if(sort==='az') arr.sort((a,b)=>a.display_title.localeCompare(b.display_title));
  else if(sort==='za') arr.sort((a,b)=>b.display_title.localeCompare(a.display_title));
  else if(sort==='played') arr.sort((a,b)=>plays(b.song_key_norm)-plays(a.song_key_norm));
  return arr;
}

function card(s){
  const c=T.mvColorByName((s.primary_movements||[])[0]);
  const folklore=s.folklore||[];
  const atus=folklore.filter(f=>f.t==='ATU');
  const tmis=folklore.filter(f=>f.t==='TMI');
  const archetypes=[...new Set((s.characters||[]).map(c=>c.archetype).filter(Boolean))].slice(0,2);
  const scmLabel=atus.length?'Story Type · ATU '+atus[0].code:tmis.length?'Motif · '+tmis[0].code:'';
  const archPills=archetypes.map(a=>`<span class="miniori" style="color:var(--violet)">${esc(a.split('/')[0].trim().slice(0,26))}</span>`).join('');

  const sum=s.interpretive_summary||'';
  const nchar=(s.characters||[]).length, ndodd=(s.dodd_annotations||[]).length;
  const tier=TIERS[s.song_key_norm];
  const tierBadge=tier?`<span style="font-family:var(--ui);font-size:10px;letter-spacing:.04em;color:${tier==='rotation'?'var(--teal)':tier==='cover'?'var(--warm)':tier==='studio'?'var(--faint)':'var(--violet)'};border:1px solid currentColor;border-radius:999px;padding:2px 7px">${CAT_LABEL[tier]||tier}</span>`:'';
  const foot=[nchar?`<span>${nchar} character${nchar===1?'':'s'}</span>`:'', ndodd?`<span class="dodd">◆ ${ndodd} note${ndodd===1?'':'s'}</span>`:''].filter(Boolean).join('');
  return `<div class="card song-card" style="--accent:${c}" onclick="Terra.openSong('${esc(s.song_key_norm)}')">
    <div class="scm">${esc(scmLabel)}</div>
    <h3 class="display">${esc(s.display_title)}</h3>
    ${archPills||tierBadge?`<div class="scoris">${archPills}${tierBadge}</div>`:''}
    ${sum?`<p class="scsum">${esc(sum)}</p>`:'<p class="scsum" style="opacity:.5">—</p>'}
    <div class="scfoot">${foot||'<span></span>'}<span class="open">Open →</span></div>
  </div>`;
}

function render(){
  const arr=filtered();
  $('count').textContent=`Showing ${arr.length} of ${CATALOG_SONGS.length}`;
  $('libKicker').textContent='All '+CATALOG_SONGS.length+' Songs';
  $('grid').innerHTML=arr.map(card).join('');
  $('empty').style.display=arr.length?'none':'block';
}

let qt;
$('q').addEventListener('input',()=>{clearTimeout(qt);qt=setTimeout(render,140);});
['cat','sort'].forEach(id=>$(id).addEventListener('change',render));
$('doddT').addEventListener('click',()=>{doddOnly=!doddOnly;$('doddT').classList.toggle('on',doddOnly);render();});
render();
})();
</script>
</body>
</html>
